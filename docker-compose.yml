services:
  # ─── PostgreSQL Database ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hanoi_lab_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hanoi_lab}
      POSTGRES_USER: ${POSTGRES_USER:-hanoi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hanoi_pass_2026}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    networks:
      - hanoi_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hanoi_user} -d ${POSTGRES_DB:-hanoi_lab}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── pgAdmin (Web UI for DB management) ───────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hanoi_lab_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@hanoi.lab}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin1234}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./database/pgadmin_servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hanoi_net

volumes:
  postgres_data:
    name: hanoi_lab_postgres_data
  pgadmin_data:
    name: hanoi_lab_pgadmin_data

networks:
  hanoi_net:
    name: hanoi_lab_network
    driver: bridge
