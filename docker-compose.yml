services:
  # ─────────────────────────────────────────────────────────────────
  # 🌐 App — React SPA (Nginx) — routed via Traefik
  # ─────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hanoi_lab_app
    restart: always
    expose:
      - "80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hanoi_net
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.huawhun.rule=Host(`huawhun.aidev.business`)"
      - "traefik.http.routers.huawhun.entrypoints=websecure"
      - "traefik.http.routers.huawhun.tls=true"
      - "traefik.http.routers.huawhun.tls.certresolver=mytlschallenge"
      - "traefik.http.services.huawhun.loadbalancer.server.port=80"

  # ─────────────────────────────────────────────────────────────────
  # 🗄️  Database — PostgreSQL 16
  # ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hanoi_lab_db
    restart: always
    environment:
      POSTGRES_DB:       hanoi_lab
      POSTGRES_USER:     aidev_techthai
      POSTGRES_PASSWORD: "CHANGE_ME_STRONG_PASSWORD"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hanoi_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aidev_techthai -d hanoi_lab"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# ─────────────────────────────────────────────────────────────────
# Volumes & Networks
# ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: hanoi_lab_postgres_data

networks:
  hanoi_net:
    name: hanoi_lab_network
    driver: bridge
  n8n_default:
    external: true
